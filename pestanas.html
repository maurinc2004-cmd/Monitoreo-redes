<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/stile.css">
    <script src="../js/tailwind.js"></script>
</head>

<body>
    <section class="flex flex-col flex-1 py-8">
        <div class="selection shadow-sm pl-8 pb-6">
            <button class="border border-gray-200 p-3 text-center font-sans rounded-lg" type="button">Modelos</button>
            <button class="border border-gray-200 p-3 text-center font-sans rounded-lg" type="button">Activos</button>
            <button class="border border-gray-200 p-3 text-center font-sans rounded-lg" type="button">Asignaciones</button>
            

        </div>
        <div id="modelos" class="container" data-section="1">
            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm mx-8">
                <table class="min-w-full divide-y divide-gray-200 bg-white text-sm">
                    <thead class="bg-gray-50 text-left">
                        <tr>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Serial</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Modelo</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Estado</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider text-right">Acciones
                            </th>
                        </tr>
                    </thead>

                    <tbody class="divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4">
                                <span
                                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                    #001
                                </span>
                            </td>
                            <td class="px-6 py-4 font-medium text-gray-900">Monitor Gaming 27"</td>
                            <td class="px-6 py-4 text-gray-600">SN-998234-A</td>
                            <td class="px-6 py-4 text-gray-600">UltraSync-V3</td>
                            <td class="px-6 py-4 text-gray-600">Disponible</td>
                            <td class="px-6 py-4 text-right space-x-3">
                                <button class="text-blue-600 hover:text-blue-900"><i class="fas fa-edit"></i>
                                    Editar</button>
                                <button class="text-red-600 hover:text-red-900"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        
                        
                    </tbody>
                </table>
                <div class="border"></div>
            </div>

            <div id="activos" class="container" data-section="1">
            <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm mx-8">
                <table class="min-w-full divide-y divide-gray-200 bg-white text-sm">
                    <thead class="bg-gray-50 text-left">
                        <tr>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Nombre</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Serial</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Modelo</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider">Estado</th>
                            <th class="px-6 py-4 font-medium text-gray-900 uppercase tracking-wider text-right">Acciones
                            </th>
                        </tr>
                    </thead>

                    <tbody class="divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4">
                                <span
                                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                                    #001
                                </span>
                            </td>
                            <td class="px-6 py-4 font-medium text-gray-900">Monitor Gaming 27"</td>
                            <td class="px-6 py-4 text-gray-600">SN-998234-A</td>
                            <td class="px-6 py-4 text-gray-600">UltraSync-V3</td>
                            <td class="px-6 py-4 text-gray-600">Disponible</td>
                            <td class="px-6 py-4 text-right space-x-3">
                                <button class="text-blue-600 hover:text-blue-900"><i class="fas fa-edit"></i>
                                    Editar</button>
                                <button class="text-red-600 hover:text-red-900"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        
                        
                    </tbody>
                </table>
            </div>

            <div class="flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 px-8 items-center mx-8">

            </div>
        </div>
        
    </section>
</body>

</html>
