<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryPro | Control System</title>
    <meta name="description" content="Modern web-based inventory management system with real-time tracking and reporting">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        secondary: "#3b82f6",
                        accent: "#10b981",
                        danger: "#ef4444",
                        warning: "#f59e0b",
                        dark: "#1f2937",
                        light: "#f9fafb"
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif']
                    },
                    spacing: {
                        '128': '32rem',
                        '144': '36rem'
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-gray-50 min-h-screen">
    <!-- Sidebar Navigation -->
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-dark text-white flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                        <i class="fas fa-boxes text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold">InventoryPro</h1>
                </div>
                <p class="text-gray-400 text-sm mt-2">v2.4.1</p>
            </div>

            <nav class="flex-1 p-4">
                <ul id="nav-menu" class="space-y-2"></ul>
            </nav>

            <div class="p-6 border-t border-gray-700">
                <div class="flex items-center space-x-3">
                    <img src="#" alt="User profile" class="w-10 h-10 rounded-full">
                    <div>
                        <p class="font-medium">John Manager</p>
                        <p class="text-gray-400 text-sm">Admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200">
                <div class="px-6 py-4 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-dark" id="page-title">Dashboard</h2>
                        <p class="text-gray-600 text-sm" id="page-subtitle">Overview of your inventory</p>
                    </div>
                </div>
            </header>

            
        </div>
    </div>

    

    <script>
        // Data Layer
        const navigationItems = [
            { "icon": "fas fa-tachometer-alt", "label": "Dashboard", "active": true, "badge": "" },
            { "icon": "fas fa-boxes", "label": "Inventory", "active": false, "badge": "" },
            { "icon": "fas fa-chart-bar", "label": "Analytics", "active": false, "badge": "" },
            { "icon": "fas fa-clipboard-list", "label": "Reports", "active": false, "badge": "" },
            
        ];

    
        // Reusable Render Functions
        
        function renderNavigationMenu(items) {
            return items.map(item => {
                const activeClass = item.active ? "bg-gray-800 text-white" : "text-gray-300 hover:bg-gray-800 hover:text-white";
                const badge = item.badge ? `<span class="ml-auto bg-primary text-white text-xs px-2 py-1 rounded-full">${item.badge}</span>` : "";
                return `
                    <li>
                        <a href="#" class="flex items-center px-4 py-3 rounded-lg ${activeClass} transition-colors">
                            <i class="${item.icon} mr-3"></i>
                            ${item.label}
                            ${badge}
                        </a>
                    </li>
                `;
            }).join("");
        }

        

        


        // Initialize Page
        function initializePage() {
            // Render navigation
            document.getElementById("nav-menu").innerHTML = renderNavigationMenu(navigationItems);
        }

        

        // Initialize on DOM load
        document.addEventListener("DOMContentLoaded", () => {
            initializePage();
            
        });
    </script>
</body>
</html>
